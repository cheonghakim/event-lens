<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EventLens Demo</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./src/styles/base.css" />
  <link rel="stylesheet" href="./src/styles/layout.css" />
  <link rel="stylesheet" href="./src/styles/components.css" />
  <link rel="stylesheet" href="./src/styles/severity.css" />
  <link rel="stylesheet" href="./src/styles/ui.css" />
  <link rel="stylesheet" href="./src/styles/theme-light.css" />
  <link rel="stylesheet" href="./src/styles/theme-dark.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: #0d0d0d;
      color: #d8d8d8;
      font-family: Inter, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .demo-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .demo-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 7px 14px;
      border-bottom: 1px solid #242424;
      background: #111;
      white-space: nowrap;
      overflow-x: auto;
    }
    .demo-title {
      color: #4e9cff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .demo-sep { color: #3a3a3a; }
    .demo-button {
      height: 28px;
      padding: 0 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      color: #cfcfcf;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .demo-button:hover {
      border-color: #4e9cff;
      color: #fff;
    }
    .demo-info {
      color: #8a8a8a;
      font-size: 12px;
    }
    #viewer {
      flex: 1 1 auto;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="demo-shell">
    <div class="demo-bar">
      <div class="demo-title">EventLens</div>
      <div class="demo-sep">|</div>
      <button class="demo-button" id="btn-theme">Light</button>
      <button class="demo-button" id="btn-density">Compact</button>
      <button class="demo-button" id="btn-add">Add 100</button>
      <button class="demo-button" id="btn-live">Start Live</button>
      <button class="demo-button" id="btn-masking">Masking ON</button>
      <div class="demo-sep">|</div>
      <div class="demo-info" id="demo-info">5,000 events · 6 plugins</div>
    </div>
    <div id="viewer"></div>
  </div>

  <script type="module">
    import {
      EventLens,
      ExportPlugin, LocalGeoIpPlugin, ThreatIntelPlugin,
      MitrePlugin, MaskingPlugin, SoarPlugin,
    } from './src/index.js'

    // ── Plugin mock data ───────────────────────────────────────────────────────
    const MOCK_GEO = {
      '10.0.0.1':      { countryCode: 'KR', country: 'Korea',         city: 'Seoul'         },
      '10.0.0.2':      { countryCode: 'KR', country: 'Korea',         city: 'Seoul'         },
      '192.168.99.1':  { countryCode: 'KR', country: 'Korea',         city: 'Busan'         },
      '8.8.8.8':       { countryCode: 'US', country: 'United States', city: 'Mountain View' },
      '1.1.1.1':       { countryCode: 'AU', country: 'Australia',     city: 'Sydney'        },
    }
    const MOCK_THREATS = {
      '203.0.113.8':   { malicious: true,  score: 92, tags: ['botnet', 'scanner'], source: 'DemoIntel' },
      '198.51.100.44': { malicious: true,  score: 78, tags: ['malware', 'c2'],     source: 'DemoIntel' },
    }
    const MITRE_RULE_MAP = {
      'R1000': [{ id: 'T1021.004', name: 'Remote Services: SSH',         tactic: 'Lateral Movement'    }],
      'R1001': [{ id: 'T1190',     name: 'Exploit Public-Facing App',    tactic: 'Initial Access'      }],
      'R1002': [{ id: 'T1110',     name: 'Brute Force',                  tactic: 'Credential Access'   }],
      'R1003': [{ id: 'T1498',     name: 'Network Denial of Service',    tactic: 'Impact'              }],
      'R1004': [{ id: 'T1071',     name: 'Application Layer Protocol',   tactic: 'Command and Control' }],
      'R1005': [{ id: 'T1046',     name: 'Network Service Discovery',    tactic: 'Discovery'           }],
      'R1006': [{ id: 'T1068',     name: 'Privilege Escalation Exploit', tactic: 'Privilege Escalation'}],
      'R1007': [{ id: 'T1041',     name: 'Exfiltration Over C2 Channel', tactic: 'Exfiltration'        }],
      'R1008': [{ id: 'T1078',     name: 'Valid Accounts',               tactic: 'Defense Evasion'     }],
    }

    const severities = ['critical', 'high', 'medium', 'low', 'info']
    const actions = ['blocked', 'denied', 'allowed', 'dropped', 'reset']
    const srcIps = ['192.168.1.100', '10.0.0.55', '172.16.3.21', '203.0.113.8', '198.51.100.44']
    const dstIps = ['10.0.0.1', '10.0.0.2', '192.168.99.1', '8.8.8.8', '1.1.1.1']
    const users = ['admin', 'user_kim', 'svc_account', 'anonymous', 'root']
    const assets = ['db-server-01', 'web-server-02', 'fw-edge-01', 'ad-controller', 'vpn-gw']
    const rules = [
      'Unauthorized SSH access',
      'SQL injection attempt',
      'Brute force login',
      'DDoS traffic spike',
      'Known malicious IP',
      'Port scan detected',
      'Privilege escalation attempt',
      'Data exfiltration warning',
      'Suspicious account activity',
    ]

    let eventCounter = 1

    function pick(values) {
      return values[Math.floor(Math.random() * values.length)]
    }

    function generateEvent(severityOverride) {
      const severity = severityOverride || pick(severities)
      const srcIp = pick(srcIps)
      const dstIp = pick(dstIps)
      const action = pick(actions)
      const user = pick(users)
      const asset = pick(assets)
      const ruleIndex = Math.floor(Math.random() * rules.length)
      const dstPort = pick([22, 80, 443, 3306, 5432, 8080])
      const srcPort = Math.floor(Math.random() * 60000) + 1024
      const now = new Date(Date.now() - Math.random() * 3_600_000)
      const id = `evt-${String(eventCounter++).padStart(6, '0')}`
      const risk =
        severity === 'critical' ? Math.floor(Math.random() * 15) + 85 :
        severity === 'high' ? Math.floor(Math.random() * 20) + 60 :
        severity === 'medium' ? Math.floor(Math.random() * 20) + 40 :
        Math.floor(Math.random() * 30) + 10

      return {
        id,
        timestamp: now.toISOString(),
        severity,
        risk_score: risk,
        src_ip: srcIp,
        dst_ip: dstIp,
        src_port: srcPort,
        dst_port: dstPort,
        protocol: 'TCP',
        action,
        rule_id: `R${1000 + ruleIndex}`,
        rule_name: rules[ruleIndex],
        user,
        asset,
        event_type: pick(['firewall', 'ids', 'auth', 'network', 'endpoint']),
        raw_log:
          `${now.toISOString()} ${asset} kernel: [${action.toUpperCase()}] ` +
          `SRC=${srcIp} DST=${dstIp} PROTO=TCP SPT=${srcPort} DPT=${dstPort} ` +
          `USER=${user} RULE=R${1000 + ruleIndex} SHA256=a3f1b2c4d5e6f7a8b9c0d1e2f3a4b5c6`,
        parsed: {
          protocol: 'TCP',
          src_port: srcPort,
          dst_port: dstPort,
          device: asset,
          bytes_in: Math.floor(Math.random() * 10000),
          bytes_out: Math.floor(Math.random() * 100000),
          session_id: `sess-${Math.random().toString(36).slice(2, 10)}`,
        },
        timeline: [
          { id: 't1', type: 'detection', time: now.toISOString(), status: 'done', actor: 'SIEM', detail: rules[ruleIndex] },
          { id: 't2', type: 'alert', time: new Date(now.getTime() + 500).toISOString(), status: 'done', actor: 'System', detail: 'Alert created' },
          { id: 't3', type: 'investigation', status: severity === 'critical' ? 'running' : 'pending', actor: severity === 'critical' ? 'analyst' : undefined },
        ],
      }
    }

    const events = Array.from({ length: 5000 }, () => generateEvent())
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))

    const viewer = new EventLens({
      container: '#viewer',
      dataSource: events,
      theme: 'dark',
      density: 'normal',
      plugins: [
        ExportPlugin,
        LocalGeoIpPlugin.configure({ ipFields: ['dst_ip'], lookup: ip => MOCK_GEO[ip] || null }),
        ThreatIntelPlugin.configure({ ipFields: ['src_ip'], lookup: async v => MOCK_THREATS[v] || { malicious: false, score: 1, tags: [], source: 'DemoIntel' } }),
        MitrePlugin.configure({ ruleMap: MITRE_RULE_MAP }),
        MaskingPlugin.configure({ fields: ['user'], reveal: true }),
        SoarPlugin.configure({
          playbooks: [
            {
              id: 'auto-block', label: 'Critical IP 자동 차단',
              auto: true, cooldown: 30_000, cooldownKey: e => e.src_ip,
              when: e => e.severity === 'critical' && !!e.src_ip,
              handler: async (e) => {
                await new Promise(r => setTimeout(r, 400 + Math.random() * 400))
                return { status: 'blocked', src_ip: e.src_ip }
              },
            },
            {
              id: 'isolate', label: '호스트 격리', auto: false,
              when: e => !!e.asset,
              handler: async (e) => {
                await new Promise(r => setTimeout(r, 300 + Math.random() * 300))
                return { status: 'isolated', asset: e.asset }
              },
            },
          ],
          onSuccess: (pb, ev) => { if (!pb.auto) alert(`✓ ${pb.label}\n${ev.src_ip || ev.asset}`) },
          onError:   (pb, ev, err) => console.warn('[SOAR]', pb.label, err.message),
        }),
      ],
      columns: [
        { id: 'severity', field: 'severity', label: 'Severity', width: 92 },
        { id: 'timestamp', field: 'timestamp', label: 'Time', width: 158 },
        { id: 'src_ip', field: 'src_ip', label: 'Src IP', width: 132 },
        { id: 'dst_ip', field: 'dst_ip', label: 'Dst IP', width: 132 },
        { id: 'dst_port', field: 'dst_port', label: 'Port', width: 64 },
        { id: 'action', field: 'action', label: 'Action', width: 88 },
        { id: 'rule_name', field: 'rule_name', label: 'Rule', width: 220 },
        { id: 'user', field: 'user', label: 'User', width: 120 },
        { id: 'asset', field: 'asset', label: 'Asset', width: 130 },
        { id: 'risk_score',   field: 'risk_score',   label: 'Risk', width: 80 },
        { id: '_soar_status', field: '_soar_status', label: 'SOAR', width: 110, sortable: false },
      ],
      highlightRules: [
        { priority: 100, when: event => event.severity === 'critical', className: 'el-row--highlight-critical' },
      ],
      actions: [
        {
          id: 'create-ticket',
          label: 'Create Ticket',
          handler: event => window.alert(`Ticket created for ${event.id}`),
        },
      ],
      detail: {
        layout: 'right',
        width: 480,
        tabs: ['parsedFields', 'rawLog', 'timeline'],
        defaultTab: 'parsedFields',
      },
    })

    const root = () => document.querySelector('#viewer .el-root')
    const info = document.getElementById('demo-info')
    let currentTheme = 'dark'
    let currentDensity = 'normal'
    let liveTimer = null

    document.getElementById('btn-theme').addEventListener('click', event => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark'
      root().dataset.elTheme = currentTheme
      event.currentTarget.textContent = currentTheme === 'dark' ? 'Light' : 'Dark'
    })

    document.getElementById('btn-density').addEventListener('click', event => {
      const next = currentDensity === 'normal' ? 'compact' : currentDensity === 'compact' ? 'comfortable' : 'normal'
      currentDensity = next
      root().dataset.elDensity = next
      event.currentTarget.textContent = next === 'normal' ? 'Compact' : next === 'compact' ? 'Comfortable' : 'Normal'
    })

    document.getElementById('btn-add').addEventListener('click', () => {
      const batch = Array.from({ length: 100 }, () => generateEvent())
      viewer._dataSource.pushLiveEvents?.(batch)
      viewer.refresh()
      info.textContent = `${viewer._dataSource.getTotalCount().toLocaleString()} security events`
    })

    document.getElementById('btn-live').addEventListener('click', event => {
      if (liveTimer) {
        clearInterval(liveTimer)
        liveTimer = null
        event.currentTarget.textContent = 'Start Live'
        return
      }
      event.currentTarget.textContent = 'Stop Live'
      liveTimer = setInterval(() => {
        const batch = Array.from({ length: Math.floor(Math.random() * 5) + 1 }, () => generateEvent())
        viewer._dataSource.pushLiveEvents?.(batch)
        viewer._grid.prependRows(batch)
        viewer.emit('live:new-events', { events: batch, count: batch.length })
        info.textContent = `${viewer._dataSource.getTotalCount().toLocaleString()} events · 6 plugins`
      }, 1200)
    })

    let maskingOn = true
    document.getElementById('btn-masking').addEventListener('click', e => {
      maskingOn = !maskingOn
      viewer.emit('masking:toggle', { enabled: maskingOn })
      viewer.refresh()
      e.currentTarget.textContent = maskingOn ? 'Masking ON' : 'Masking OFF'
      e.currentTarget.style.color = maskingOn ? '' : '#52c41a'
    })
  </script>
</body>
</html>
