<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraceScope Demo</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./dist/trace-scope.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: #0d0d0d;
      color: #d8d8d8;
      font-family: Inter, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
    .demo-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .demo-bar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 46px;
      padding: 7px 14px;
      border-bottom: 1px solid #242424;
      background: #111;
      white-space: nowrap;
      overflow-x: auto;
    }
    .demo-title {
      color: #4e9cff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .demo-sep { color: #3a3a3a; }
    .demo-button {
      height: 28px;
      padding: 0 10px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      color: #cfcfcf;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    .demo-button:hover {
      border-color: #4e9cff;
      color: #fff;
    }
    .demo-info {
      color: #767676;
      font-size: 12px;
    }
    #viewer {
      flex: 1 1 auto;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="demo-shell">
    <div class="demo-bar">
      <div class="demo-title">TraceScope</div>
      <div class="demo-sep">|</div>
      <button class="demo-button" id="btn-theme">Light</button>
      <button class="demo-button" id="btn-density">Compact</button>
      <button class="demo-button" id="btn-add">Add 100</button>
      <button class="demo-button" id="btn-live">Start Live</button>
      <div class="demo-sep">|</div>
      <div class="demo-info" id="demo-info">5,000 security events</div>
    </div>
    <div id="viewer"></div>
  </div>

  <script type="module">
    import { TraceScope, ExportPlugin } from './dist/index.mjs'

    TraceScope.use(ExportPlugin)

    const severities = ['critical', 'high', 'medium', 'low', 'info']
    const actions = ['blocked', 'denied', 'allowed', 'dropped', 'reset']
    const srcIps = ['192.168.1.100', '10.0.0.55', '172.16.3.21', '203.0.113.8', '198.51.100.44']
    const dstIps = ['10.0.0.1', '10.0.0.2', '192.168.99.1', '8.8.8.8', '1.1.1.1']
    const users = ['admin', 'user_kim', 'svc_account', 'anonymous', 'root']
    const assets = ['db-server-01', 'web-server-02', 'fw-edge-01', 'ad-controller', 'vpn-gw']
    const rules = [
      'Unauthorized SSH access',
      'SQL injection attempt',
      'Brute force login',
      'DDoS traffic spike',
      'Known malicious IP',
      'Port scan detected',
      'Privilege escalation attempt',
      'Data exfiltration warning',
      'Suspicious account activity',
    ]

    let eventCounter = 1

    function pick(values) {
      return values[Math.floor(Math.random() * values.length)]
    }

    function generateEvent(severityOverride) {
      const severity = severityOverride || pick(severities)
      const srcIp = pick(srcIps)
      const dstIp = pick(dstIps)
      const action = pick(actions)
      const user = pick(users)
      const asset = pick(assets)
      const ruleIndex = Math.floor(Math.random() * rules.length)
      const dstPort = pick([22, 80, 443, 3306, 5432, 8080])
      const srcPort = Math.floor(Math.random() * 60000) + 1024
      const now = new Date(Date.now() - Math.random() * 3_600_000)
      const id = `evt-${String(eventCounter++).padStart(6, '0')}`
      const risk =
        severity === 'critical' ? Math.floor(Math.random() * 15) + 85 :
        severity === 'high' ? Math.floor(Math.random() * 20) + 60 :
        severity === 'medium' ? Math.floor(Math.random() * 20) + 40 :
        Math.floor(Math.random() * 30) + 10

      return {
        id,
        timestamp: now.toISOString(),
        severity,
        risk_score: risk,
        src_ip: srcIp,
        dst_ip: dstIp,
        src_port: srcPort,
        dst_port: dstPort,
        protocol: 'TCP',
        action,
        rule_id: `R${1000 + ruleIndex}`,
        rule_name: rules[ruleIndex],
        user,
        asset,
        event_type: pick(['firewall', 'ids', 'auth', 'network', 'endpoint']),
        raw_log:
          `${now.toISOString()} ${asset} kernel: [${action.toUpperCase()}] ` +
          `SRC=${srcIp} DST=${dstIp} PROTO=TCP SPT=${srcPort} DPT=${dstPort} ` +
          `USER=${user} RULE=R${1000 + ruleIndex} SHA256=a3f1b2c4d5e6f7a8b9c0d1e2f3a4b5c6`,
        parsed: {
          protocol: 'TCP',
          src_port: srcPort,
          dst_port: dstPort,
          device: asset,
          bytes_in: Math.floor(Math.random() * 10000),
          bytes_out: Math.floor(Math.random() * 100000),
          session_id: `sess-${Math.random().toString(36).slice(2, 10)}`,
        },
        timeline: [
          { id: 't1', type: 'detection', time: now.toISOString(), status: 'done', actor: 'SIEM', detail: rules[ruleIndex] },
          { id: 't2', type: 'alert', time: new Date(now.getTime() + 500).toISOString(), status: 'done', actor: 'System', detail: 'Alert created' },
          { id: 't3', type: 'investigation', status: severity === 'critical' ? 'running' : 'pending', actor: severity === 'critical' ? 'analyst' : undefined },
        ],
      }
    }

    const events = Array.from({ length: 5000 }, () => generateEvent())
      .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))

    const viewer = new TraceScope({
      container: '#viewer',
      dataSource: events,
      theme: 'dark',
      density: 'normal',
      worker: true,
      columns: [
        { id: 'severity', field: 'severity', label: 'Severity', width: 92 },
        { id: 'timestamp', field: 'timestamp', label: 'Time', width: 158 },
        { id: 'src_ip', field: 'src_ip', label: 'Src IP', width: 132 },
        { id: 'dst_ip', field: 'dst_ip', label: 'Dst IP', width: 132 },
        { id: 'dst_port', field: 'dst_port', label: 'Port', width: 64 },
        { id: 'action', field: 'action', label: 'Action', width: 88 },
        { id: 'rule_name', field: 'rule_name', label: 'Rule', width: 220 },
        { id: 'user', field: 'user', label: 'User', width: 120 },
        { id: 'asset', field: 'asset', label: 'Asset', width: 130 },
        { id: 'risk_score', field: 'risk_score', label: 'Risk', width: 80 },
      ],
      highlightRules: [
        { priority: 100, when: event => event.severity === 'critical', className: 'ts-row--highlight-critical' },
      ],
      actions: [
        {
          id: 'create-ticket',
          label: 'Create Ticket',
          handler: event => window.alert(`Ticket created for ${event.id}`),
        },
      ],
      detail: {
        layout: 'right',
        width: 480,
        tabs: ['parsedFields', 'rawLog', 'timeline'],
        defaultTab: 'parsedFields',
      },
    })

    const root = () => document.querySelector('#viewer .ts-root')
    const info = document.getElementById('demo-info')
    let currentTheme = 'dark'
    let currentDensity = 'normal'
    let liveTimer = null

    document.getElementById('btn-theme').addEventListener('click', event => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark'
      root().dataset.tsTheme = currentTheme
      event.currentTarget.textContent = currentTheme === 'dark' ? 'Light' : 'Dark'
    })

    document.getElementById('btn-density').addEventListener('click', event => {
      const next = currentDensity === 'normal' ? 'compact' : currentDensity === 'compact' ? 'comfortable' : 'normal'
      currentDensity = next
      root().dataset.tsDensity = next
      event.currentTarget.textContent = next === 'normal' ? 'Compact' : next === 'compact' ? 'Comfortable' : 'Normal'
    })

    document.getElementById('btn-add').addEventListener('click', () => {
      const batch = Array.from({ length: 100 }, () => generateEvent())
      viewer._dataSource.pushLiveEvents?.(batch)
      viewer.refresh()
      info.textContent = `${viewer._dataSource.getTotalCount().toLocaleString()} security events`
    })

    document.getElementById('btn-live').addEventListener('click', event => {
      if (liveTimer) {
        clearInterval(liveTimer)
        liveTimer = null
        event.currentTarget.textContent = 'Start Live'
        return
      }
      event.currentTarget.textContent = 'Stop Live'
      liveTimer = setInterval(() => {
        const batch = Array.from({ length: Math.floor(Math.random() * 5) + 1 }, () => generateEvent())
        viewer._dataSource.pushLiveEvents?.(batch)
        viewer._grid.prependRows(batch)
        info.textContent = `${viewer._dataSource.getTotalCount().toLocaleString()} security events`
      }, 1200)
    })
  </script>
</body>
</html>
